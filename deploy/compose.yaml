# Melon — production deployment, exposed through Cloudflare Tunnel (cloudflared).
#
#   cd deploy
#   cp env.example .env && chmod 600 .env    # config + the tunnel token
#   ./init-secrets.sh                        # generates DB / admin passwords
#   cp /path/to/keys.jsonl secrets/          # FeliCa DES keys
#   docker compose up -d
#
# The tunnel (public hostname → this server) is created in the Cloudflare Zero
# Trust dashboard; see the `cloudflared` service below.
#
# Topology:
#
#     browsers & terminals ──HTTPS──▶ Cloudflare edge
#                                          │  (outbound-only tunnel)
#                                     cloudflared ──▶ server ──▶ db
#
# NO INBOUND PORTS. cloudflared dials *out* to Cloudflare, so nothing here
# publishes a port and no firewall hole is needed. There is no reverse proxy
# either, so the hardening headers (HSTS/CSP/X-Frame-Options/…) are set by
# melon-server itself — see `security_headers` in melon-server/src/lib.rs.
#
# ⚠️ SINGLE INSTANCE. FeliCa mutual-authentication sessions live in the server's
#    memory, so a card tap and the money operation that follows it MUST reach the
#    same process. Do not scale `server` past 1 replica — every payment would fail.
#    (The ledger is in PostgreSQL and would be fine; the auth sessions are not.)
#
# ⚠️ COOKIES STAY `Secure`. TLS is terminated at the Cloudflare edge, so the
#    *browser* is on HTTPS even though cloudflared→server is plain HTTP inside
#    this network. `MELON_COOKIE_SECURE=true` is therefore correct — do not turn
#    it off just because the container speaks HTTP.

# Distinct from the development project (the repo-root compose.yaml is project
# `melon`). Sharing a project name would make `docker compose down` here tear
# down the developer's database too.
name: melon-prod

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: melon
      POSTGRES_DB: melon
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      # Data checksums catch silent corruption in a ledger we can never rewrite.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No `ports:` — the database is reachable only on the internal network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melon -d melon"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s
    logging: &logging
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  server:
    image: melon-server:${MELON_VERSION:-latest}
    build:
      # The repo root (deploy/ lives inside it).
      context: ..
      dockerfile: Dockerfile
      # Forward the SSH agent so the private `felica-rs` git dependency can be
      # fetched at build time (requires BuildKit; use `docker compose build`).
      ssh:
        - default
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Secrets arrive as files, never as environment values (see `secrets:`).
      DATABASE_URL_FILE: /run/secrets/database_url
      MELON_KEYS: /run/secrets/felica_keys
      MELON_BOOTSTRAP_ADMIN_EMAIL: ${MELON_BOOTSTRAP_ADMIN_EMAIL}
      MELON_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/bootstrap_admin_password

      # The browser reaches us over HTTPS (Cloudflare edge). See the note above.
      MELON_COOKIE_SECURE: "true"
      MELON_USER_SESSION_TTL: ${MELON_USER_SESSION_TTL:-43200}

      MELON_SWEEP_INTERVAL_SECS: ${MELON_SWEEP_INTERVAL_SECS:-3600}
      MELON_DEFAULT_FEE_BPS: ${MELON_DEFAULT_FEE_BPS:-0}
      MELON_DEFAULT_CREDIT_LIMIT: ${MELON_DEFAULT_CREDIT_LIMIT:-0}
      FELICA_SESSION_TTL: ${FELICA_SESSION_TTL:-300}
      FELICA_MAX_SESSIONS: ${FELICA_MAX_SESSIONS:-1024}
      RUST_LOG: ${RUST_LOG:-info}
    secrets:
      - database_url
      - bootstrap_admin_password
      - felica_keys
    # Reachable only by cloudflared, on the internal network.
    expose:
      - "8080"
    deploy:
      # See the SINGLE INSTANCE note above. Raising this breaks payments.
      replicas: 1
      resources:
        limits: { cpus: "2.0", memory: 1g }
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    stop_grace_period: 20s
    logging: *logging

  # Dashboard-managed ("token") tunnel: the public hostname and the route to this
  # server are configured in Cloudflare Zero Trust, not here.
  #
  #   Zero Trust → Networks → Tunnels → Create a tunnel → Cloudflared
  #     • copy the token into deploy/.env as CLOUDFLARE_TUNNEL_TOKEN
  #     • Public hostname:  melon.example.com
  #       Service:          HTTP  →  server:8080      ← the compose service name,
  #                                                      NOT localhost:8080
  #
  # ⚠️ The image is distroless (no shell) and cloudflared has no `*_FILE` support,
  #    so the token must be an environment value — unlike every other secret here.
  #    It is therefore visible to anyone who can run `docker inspect` on this host.
  #    Keep deploy/.env at mode 600, restrict docker-socket access, and rotate the
  #    token from the dashboard if it leaks (it only authorizes running the tunnel).
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    # The image entrypoint is already `cloudflared --no-autoupdate`.
    command: ["tunnel", "run"]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in deploy/.env}
    # No `ports:` — the tunnel is an OUTBOUND connection to Cloudflare.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    logging: *logging

secrets:
  # Keep `deploy/secrets/` at mode 700 (the files themselves may be 444 — the
  # directory is what protects them on the host).
  db_password:
    file: ./secrets/db_password
  # The full connection string, e.g.
  #   postgres://melon:<same password>@db:5432/melon
  database_url:
    file: ./secrets/database_url
  bootstrap_admin_password:
    file: ./secrets/bootstrap_admin_password
  # The FeliCa DES keys. The most sensitive file in the system: with it, anyone
  # can authenticate cards. Never bake it into the image, never commit it.
  felica_keys:
    file: ./secrets/keys.jsonl

volumes:
  pgdata:
