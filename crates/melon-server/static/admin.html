<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Melon 管理画面</title>
<style>
  :root {
    --bg: #f5f6f8; --panel: #ffffff; --panel-2: #fafbfc; --border: #e4e7ec;
    --text: #1b1f27; --muted: #6b7280; --accent: #1f9d55; --accent-weak: #e6f5ec;
    --danger: #d64545; --danger-weak: #fbe9e9; --shadow: 0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101215; --panel: #1a1d22; --panel-2: #22262d; --border: #2c313a;
      --text: #e7e9ec; --muted: #9aa2af; --accent: #37c26f; --accent-weak: #16301f;
      --danger: #ef6b6b; --danger-weak: #351c1c; --shadow: none;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  a { color: var(--accent); }
  h1, h2, h3 { margin: 0; font-weight: 650; }
  button { font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); padding: 8px 14px; transition: .12s; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.sm { padding: 5px 10px; font-size: 12.5px; margin-left: 6px; }
  button.primary:hover { filter: brightness(1.05); }
  button:disabled { opacity: .5; cursor: default; }
  input, select { font: inherit; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); }
  input:focus, select:focus { outline: 2px solid var(--accent-weak); border-color: var(--accent); }
  .muted { color: var(--muted); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }

  /* login */
  #login { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
  .login-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: var(--shadow); padding: 28px; width: 100%; max-width: 380px; }
  .login-card h1 { font-size: 22px; margin-bottom: 4px; }
  .login-card p { margin: 0 0 18px; }
  .login-card input { width: 100%; margin-bottom: 12px; }
  .login-card button { width: 100%; }

  /* app shell */
  header { position: sticky; top: 0; z-index: 5; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; padding: 12px 20px; }
  header .brand { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  nav { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
  nav button { border: none; background: transparent; color: var(--muted); padding: 7px 12px; border-radius: 8px; }
  nav button.active { background: var(--accent-weak); color: var(--accent); font-weight: 600; }
  main { max-width: 1040px; margin: 0 auto; padding: 22px 20px 60px; }
  .section { display: none; }
  .section.active { display: block; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
  .stat .label { color: var(--muted); font-size: 12.5px; }
  .stat .value { font-size: 26px; font-weight: 700; margin-top: 6px; letter-spacing: -.5px; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow);
    padding: 18px; margin-bottom: 20px; }
  .panel h2 { font-size: 15px; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  .table-wrap { overflow-x: auto; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }

  .pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.active { background: var(--accent-weak); color: var(--accent); }
  .pill.suspended, .pill.closed { background: var(--danger-weak); color: var(--danger); }
  .kind { font-size: 12px; font-weight: 600; }
  .pos { color: var(--accent); } .neg { color: var(--danger); }

  .keybox { background: var(--accent-weak); border: 1px solid var(--accent); border-radius: 10px; padding: 14px; margin-top: 14px; }
  .keybox .k { display: flex; gap: 10px; align-items: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--danger);
    color: #fff; padding: 10px 16px; border-radius: 10px; box-shadow: var(--shadow); display: none; z-index: 20; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
    align-items: center; justify-content: center; z-index: 30; padding: 20px; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: var(--shadow); padding: 22px; width: 100%; max-width: 460px; }
  .modal h3 { margin-bottom: 6px; }
  .modal .k { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
  .bar { height: 8px; border-radius: 4px; background: var(--accent); }
  .empty { color: var(--muted); padding: 18px; text-align: center; }
</style>
</head>
<body>

<!-- login -->
<div id="login">
  <div class="login-card">
    <h1>🍈 Melon 管理画面</h1>
    <p class="muted">発行者アカウントでサインインしてください。</p>
    <input id="email" type="email" placeholder="メールアドレス" autocomplete="username"
      onkeydown="if(event.key==='Enter')$('password').focus()">
    <input id="password" type="password" placeholder="パスワード" autocomplete="current-password"
      style="margin-top:10px" onkeydown="if(event.key==='Enter')login()">
    <button class="primary" style="margin-top:12px" onclick="login()">サインイン</button>
    <p id="loginErr" class="muted" style="color:var(--danger);margin-top:12px;display:none"></p>
  </div>
</div>

<!-- app -->
<div id="app" style="display:none">
  <header>
    <div class="brand"><span class="dot"></span> Melon 管理画面</div>
    <nav id="nav"></nav>
    <span id="who" class="muted" style="font-size:12.5px;margin-right:10px"></span>
    <button onclick="logout()">サインアウト</button>
  </header>
  <main>
    <section id="overview" class="section"></section>
    <section id="merchants" class="section"></section>
    <section id="accounts" class="section"></section>
    <section id="transactions" class="section"></section>
    <section id="report" class="section"></section>
    <section id="issuer" class="section"></section>
    <section id="users" class="section"></section>
  </main>
</div>

<div id="toast" class="toast"></div>

<!-- API key reveal (shown once at creation / rotation) -->
<div id="keyModal" class="modal-overlay">
  <div class="modal">
    <h3 id="keyModalTitle">API キー</h3>
    <p class="muted">この API キーは<strong>今だけ</strong>表示されます。安全な場所に保存してください(サーバはハッシュのみ保持します)。</p>
    <div class="k">
      <input id="keyModalValue" class="mono" style="flex:1" readonly onclick="this.select()">
      <button onclick="copyKey()">コピー</button>
    </div>
    <div class="muted mono" id="keyModalMerchant" style="margin-top:8px"></div>
    <div style="text-align:right;margin-top:16px"><button class="primary" onclick="closeKeyModal()">閉じる</button></div>
  </div>
</div>

<script>
"use strict";
// No credential lives in JS: the session is an HttpOnly cookie the browser
// attaches automatically (same-origin). XSS cannot read or exfiltrate it.
let me = null;

const yen = n => "¥" + Number(n).toLocaleString("ja-JP");
const scHex = n => "0x" + Number(n).toString(16).toUpperCase().padStart(4, "0");
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const fmtTime = s => { try { return new Date(s).toLocaleString("ja-JP"); } catch { return s; } };
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 4000);
}

// API key reveal modal (shown once).
function showKey(title, secret, merchantId) {
  $("keyModalTitle").textContent = title;
  $("keyModalValue").value = secret;
  $("keyModalMerchant").textContent = merchantId ? "merchant_id: " + merchantId : "";
  $("keyModal").style.display = "flex";
  $("keyModalValue").focus(); $("keyModalValue").select();
}
function closeKeyModal() { $("keyModal").style.display = "none"; }
function copyKey() { navigator.clipboard.writeText($("keyModalValue").value); toast("コピーしました"); }

async function api(method, path, body) {
  const opts = { method, headers: {}, credentials: "same-origin" };
  if (method !== "GET") opts.headers["Idempotency-Key"] = crypto.randomUUID();
  if (body !== undefined) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  const text = await res.text();
  let data = null; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) throw new Error((data && data.error && data.error.message) || ("HTTP " + res.status));
  return data;
}

// ---- auth ----
async function login() {
  const email = $("email").value.trim(), password = $("password").value;
  if (!email || !password) return;
  try {
    const r = await api("POST", "/v1/auth/login", { email, password });
    me = r.user;
    showApp();
  } catch (e) {
    const el = $("loginErr"); el.textContent = "サインインできません: " + e.message; el.style.display = "block";
  }
}
async function logout() {
  try { await api("POST", "/v1/auth/logout"); } catch {}
  location.reload();
}

function showApp() {
  $("login").style.display = "none";
  $("app").style.display = "block";
  $("who").textContent = me ? `${me.name}(${me.email})` : "";
  go("overview");
}

// ---- nav ----
const TABS = [
  ["overview", "概要", renderOverview],
  ["merchants", "加盟店", renderMerchants],
  ["accounts", "利用者", renderAccounts],
  ["transactions", "取引", renderTransactions],
  ["report", "未使用残高", renderReport],
  ["issuer", "発行者", renderIssuer],
  ["users", "ユーザー", renderUsers],
];
function buildNav() {
  $("nav").innerHTML = TABS.map(([id, label]) =>
    `<button data-tab="${id}" onclick="go('${id}')">${label}</button>`).join("");
}
function go(id) {
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.tab === id));
  document.querySelectorAll(".section").forEach(s => s.classList.toggle("active", s.id === id));
  const tab = TABS.find(t => t[0] === id);
  if (tab) tab[2]().catch(e => toast(e.message));
}

// ---- overview ----
async function renderOverview() {
  const el = $("overview");
  el.innerHTML = `<div class="muted">読み込み中…</div>`;
  const [report, merchants, issuer, health] = await Promise.all([
    api("GET", "/v1/admin/reports/outstanding-balance"),
    api("GET", "/v1/merchants"),
    api("GET", "/v1/admin/issuer/balance"),
    fetch("/healthz").then(r => r.json()).catch(() => ({})),
  ]);
  el.innerHTML = `
    <div class="cards">
      <div class="stat"><div class="label">未使用残高(合計)</div><div class="value">${yen(report.total)}</div></div>
      <div class="stat"><div class="label">発行者残高(収益)</div><div class="value ${issuer.balance < 0 ? "neg" : ""}">${yen(issuer.balance)}</div></div>
      <div class="stat"><div class="label">口座数</div><div class="value">${report.account_count.toLocaleString()}</div></div>
      <div class="stat"><div class="label">加盟店数</div><div class="value">${merchants.length.toLocaleString()}</div></div>
      <div class="stat"><div class="label">ライブセッション</div><div class="value">${(health.live_sessions ?? 0).toLocaleString()}</div></div>
    </div>
    <div class="panel">
      <h2>失効スイープ(資金決済法)</h2>
      <p class="muted">有効期限を過ぎた残高を失効させ、台帳に記帳します。通常は自動実行されますが、手動でも実行できます。</p>
      <button class="primary" onclick="runSweep(this)">スイープを実行</button>
      <span id="sweepResult" class="muted" style="margin-left:12px"></span>
    </div>`;
}
async function runSweep(btn) {
  btn.disabled = true;
  try {
    const r = await api("POST", "/v1/admin/expiry/sweep");
    $("sweepResult").textContent = r.ran
      ? `完了: ${r.expired_buckets} バケット / ${yen(r.expired_amount)} を失効`
      : "他インスタンスが実行中のためスキップ";
  } catch (e) { toast(e.message); } finally { btn.disabled = false; }
}

// ---- merchants ----
async function renderMerchants() {
  const el = $("merchants");
  const list = await api("GET", "/v1/merchants");
  const statusOpts = (cur) => ["active", "suspended", "closed"]
    .map(s => `<option value="${s}" ${s === cur ? "selected" : ""}>${s}</option>`).join("");
  const rows = list.length ? list.map(m => `
      <tr style="cursor:pointer" onclick="selectMerchant('${esc(m.id)}','${esc(m.code)}')">
        <td class="mono">${esc(m.code)}</td>
        <td>${esc(m.name)}</td>
        <td class="num">${(m.fee_bps / 100).toFixed(2)}%</td>
        <td class="num ${m.collected < 0 ? "neg" : ""}">${yen(m.collected)}</td>
        <td><select onclick="event.stopPropagation()" onchange="setMerchantStatus('${esc(m.id)}', this.value, this)">${statusOpts(m.status)}</select></td>
        <td class="mono muted">${esc(m.id).slice(0, 8)}…</td>
        <td class="muted">${fmtTime(m.created_at)}</td>
      </tr>`).join("") : `<tr><td colspan="7" class="empty">加盟店がありません</td></tr>`;
  el.innerHTML = `
    <div class="panel">
      <h2>新規加盟店</h2>
      <div class="row">
        <div class="field"><label>コード</label><input id="mCode" placeholder="shop-1"></div>
        <div class="field"><label>名称</label><input id="mName" placeholder="テスト店舗"></div>
        <div class="field"><label>手数料(bps)</label><input id="mFee" type="number" min="0" max="10000" value="0" style="width:110px"></div>
        <div class="field"><label>与信限度(円)</label><input id="mCredit" type="number" min="0" value="0" style="width:130px"></div>
        <button class="primary" onclick="createMerchant(this)">作成</button>
      </div>
    </div>
    <div class="panel">
      <h2>加盟店一覧(${list.length}) <span class="muted" style="font-weight:400">行を選択して精算残高を確認・編集</span></h2>
      <div class="table-wrap"><table>
        <thead><tr><th>コード</th><th>名称</th><th class="num">手数料</th><th class="num">精算残高</th><th>状態</th><th>ID</th><th>作成日時</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
    <div id="merchDetail"></div>`;
}
async function setMerchantStatus(id, status, sel) {
  sel.disabled = true;
  try { await api("POST", `/v1/admin/merchants/${id}/status`, { status }); toast("状態を更新しました"); }
  catch (e) { toast(e.message); renderMerchants(); }
  finally { sel.disabled = false; }
}
async function selectMerchant(id, code) {
  const box = $("merchDetail");
  box.innerHTML = `<div class="panel muted">読み込み中…</div>`;
  try {
    const [merchants, txns] = await Promise.all([
      api("GET", "/v1/merchants"),
      api("GET", `/v1/admin/transactions?limit=20&merchant_id=${encodeURIComponent(id)}`),
    ]);
    const m = merchants.find(x => x.id === id) || { code, collected: 0 };
    const history = txns.length ? txns.map(t => {
      const sign = t.kind === "payment" ? "pos" : (t.kind === "refund" || t.kind === "reversal") ? "neg" : "";
      return `<tr><td class="muted">${fmtTime(t.occurred_at)}</td><td class="kind">${esc(t.kind)}</td>
        <td class="mono">${esc(t.idi)}</td><td class="num ${sign}">${yen(t.amount)}</td></tr>`;
    }).join("") : `<tr><td colspan="4" class="empty">取引なし</td></tr>`;
    box.innerHTML = `
      <div class="panel">
        <h2>加盟店詳細 <span class="mono" style="font-weight:400">${esc(m.code)}</span></h2>
        <div class="cards" style="margin-bottom:16px">
          <div class="stat"><div class="label">精算残高</div><div class="value ${m.collected < 0 ? "neg" : ""}">${yen(m.collected)}</div></div>
          <div class="stat"><div class="label">決済手数料率</div><div class="value">${(m.fee_bps / 100).toFixed(2)}%</div></div>
          <div class="stat"><div class="label">与信限度</div><div class="value">${yen(m.credit_limit)}</div></div>
          <div class="stat"><div class="label">チャージ余力</div><div class="value ${(m.collected + m.credit_limit) < 0 ? "neg" : ""}">${yen(m.collected + m.credit_limit)}</div></div>
        </div>
        <div class="row" style="margin-bottom:16px">
          <div class="field"><label>手数料率(bps, 1bps=0.01%)</label><input id="mFeeEdit" type="number" min="0" max="10000" value="${m.fee_bps}" style="width:150px"></div>
          <button onclick="setMerchantFee('${esc(id)}', this)">手数料を更新</button>
        </div>
        <div class="row" style="margin-bottom:16px">
          <div class="field"><label>与信限度(円, topup 用のマイナス許容額)</label><input id="mCreditEdit" type="number" min="0" value="${m.credit_limit}" style="width:170px"></div>
          <button onclick="setMerchantCreditLimit('${esc(id)}', this)">与信限度を更新</button>
        </div>
        <div style="margin-bottom:18px">
          <button onclick="rotateKey('${esc(id)}', this)">API キー再発行</button>
          <span class="muted" style="margin-left:8px">既存キーを失効し、新しいキーを発行します</span>
        </div>
        <h3 style="font-size:13px;margin-bottom:8px">精算残高の調整(監査記録に残ります)</h3>
        <div class="row" style="margin-bottom:6px">
          <div class="field"><label>種別</label>
            <select id="mAdjSign"><option value="1">入金(credit)</option><option value="-1">引落(debit)</option></select></div>
          <div class="field"><label>金額(円)</label><input id="mAdjAmount" type="number" min="1" placeholder="1000"></div>
          <div class="field" style="flex:1;min-width:160px"><label>理由</label><input id="mAdjReason" placeholder="調整理由(任意)"></div>
          <button class="primary" onclick="submitMerchantAdjust('${esc(id)}', this)">適用</button>
        </div>
        <p class="muted" style="margin:0 0 18px">精算残高 = 受領した支払 − チャージ取扱 − 返金・取消 + 調整(発行者が加盟店に支払う額)。</p>
        <h3 style="font-size:13px;margin-bottom:8px">最近の取引</h3>
        <div class="table-wrap"><table>
          <thead><tr><th>日時</th><th>種別</th><th>IDi</th><th class="num">金額</th></tr></thead>
          <tbody>${history}</tbody></table></div>
      </div>`;
  } catch (e) { box.innerHTML = `<div class="panel empty">${esc(e.message)}</div>`; }
}
async function setMerchantFee(id, btn) {
  const fee_bps = parseInt($("mFeeEdit").value, 10);
  if (!(fee_bps >= 0 && fee_bps <= 10000)) return toast("0〜10000 bps の範囲で入力してください");
  btn.disabled = true;
  try {
    await api("POST", `/v1/admin/merchants/${encodeURIComponent(id)}/fee`, { fee_bps });
    toast("手数料率を更新しました");
    await renderMerchants();
    await selectMerchant(id);
  } catch (e) { toast(e.message); } finally { btn.disabled = false; }
}
async function setMerchantCreditLimit(id, btn) {
  const credit_limit = parseInt($("mCreditEdit").value, 10);
  if (!(credit_limit >= 0)) return toast("0 以上で入力してください");
  btn.disabled = true;
  try {
    await api("POST", `/v1/admin/merchants/${encodeURIComponent(id)}/credit-limit`, { credit_limit });
    toast("与信限度を更新しました");
    await renderMerchants();
    await selectMerchant(id);
  } catch (e) { toast(e.message); } finally { btn.disabled = false; }
}
async function rotateKey(id, btn) {
  if (!confirm("この加盟店の既存 API キーをすべて失効し、新しいキーを発行します。よろしいですか?")) return;
  btn.disabled = true;
  try {
    const r = await api("POST", `/v1/admin/merchants/${encodeURIComponent(id)}/api-keys`);
    showKey("API キー(再発行)", r.api_key, r.merchant_id || id);
  } catch (e) { toast(e.message); } finally { btn.disabled = false; }
}
async function submitMerchantAdjust(id, btn) {
  const sign = parseInt($("mAdjSign").value, 10);
  const amount = parseInt($("mAdjAmount").value, 10);
  const reason = $("mAdjReason").value.trim();
  if (!amount || amount <= 0) return toast("金額を入力してください");
  btn.disabled = true;
  try {
    const r = await api("POST", `/v1/admin/merchants/${encodeURIComponent(id)}/adjust`,
      { delta: sign * amount, reason: reason || null });
    toast(`調整完了: 精算残高 ${yen(r.balance)}`);
    await renderMerchants();
    await selectMerchant(id);
  } catch (e) { toast(e.message); } finally { btn.disabled = false; }
}

async function submitAdjust(sc, idm, idi, btn) {
  const sign = parseInt($("adjSign").value, 10);
  const amount = parseInt($("adjAmount").value, 10);
  const reason = $("adjReason").value.trim();
  if (!amount || amount <= 0) return toast("金額を入力してください");
  btn.disabled = true;
  try {
    const r = await api("POST", `/v1/admin/accounts/${encodeURIComponent(sc)}/${encodeURIComponent(idm)}/${encodeURIComponent(idi)}/adjust`,
      { delta: sign * amount, reason: reason || null });
    toast(`調整完了: 残高 ${yen(r.balance)}`);
    selectAccount(sc, idm, idi);
  } catch (e) { toast(e.message); } finally { btn.disabled = false; }
}
async function adminRefund(paymentId, refundable, sc, idm, idi) {
  const input = prompt(`返金額(円)。空欄で全額(${refundable})を返金します。`);
  if (input === null) return;
  const amount = input.trim() === "" ? null : parseInt(input, 10);
  if (amount !== null && !(amount > 0)) return toast("金額が不正です");
  try {
    const r = await api("POST", "/v1/admin/refunds", { payment_id: paymentId, amount });
    toast(`返金しました: ${yen(r.amount)}`);
    selectAccount(sc, idm, idi);
  } catch (e) { toast(e.message); }
}
async function adminVoid(paymentId, sc, idm, idi) {
  if (!confirm("この支払いを全額取消しますか?")) return;
  try {
    const r = await api("POST", `/v1/admin/payments/${encodeURIComponent(paymentId)}/void`);
    toast(`取消しました: ${yen(r.amount)}`);
    selectAccount(sc, idm, idi);
  } catch (e) { toast(e.message); }
}

  try {
    await api("POST", `/v1/admin/users/${encodeURIComponent(id)}/password`, { new_password: pw });
    toast("パスワードを再設定しました(既存セッションは失効)");
  } catch (e) { toast(e.message); }
}

// ---- boot ----
buildNav();
api("GET", "/v1/auth/me").then(u => { me = u; showApp(); }).catch(() => { /* show the sign-in card */ });
</script>
